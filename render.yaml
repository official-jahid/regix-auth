# Render Blueprint Configuration for Regix Auth
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: regix-auth
    env: node
    region: oregon
    plan: free
    buildCommand: |
      curl -fsSL https://bun.sh/install | bash
      export BUN_INSTALL="/opt/render/.bun"
      export PATH="$BUN_INSTALL/bin:$PATH"
      bun install
      bun migrate
      bun seed
    startCommand: |
      export BUN_INSTALL="/opt/render/.bun"
      export PATH="$BUN_INSTALL/bin:$PATH"
      bun dev
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "24"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:./prisma/dev.db
      - key: CHECKPOINT_DISABLE
        value: "1"
      - key: NEXT_PUBLIC_APP_URL
        fromService:
          name: regix-auth
          type: web
          property: hostport
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true
      - key: RESEND_API_KEY
        sync: false
      - key: NEXT_PUBLIC_DISCORD_CLIENT_ID
        sync: false
      - key: DISCORD_CLIENT_SECRET
        sync: false
      - key: DISCORD_REDIRECT_URI
        sync: false
      - key: DISCORD_BOT_TOKEN
        sync: false
      - key: DISCORD_CLIENT_ID
        sync: false
      - key: DISCORD_GUILD_ID
        sync: false
      - key: DISCORD_ADMIN_ROLE_ID
        sync: false
      - key: DISCORD_MOD_ROLE_ID
        sync: false
      - key: ADMIN_USERNAME
        value: ceojahid
      - key: ADMIN_PASSWORD
        value: RegixAdmin123!
      - key: ADMIN_EMAIL
        value: jahidekbalmallick@gmail.com
