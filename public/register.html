<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0" />
    <title>REGIX // Registration</title>
    <link
      rel="stylesheet"
      href="/css/dist.css" />
  </head>
  <body class="flex items-center justify-center min-h-screen">
    <canvas
      id="particleCanvas"
      class="fixed inset-0 -z-10 pointer-events-none"></canvas>

    <div class="relative z-10 w-full max-w-md px-6 py-8">
      <div class="glass-card rounded-xl p-8">
        <!-- Logo -->
        <div class="text-center mb-6">
          <div
            class="inline-block bg-[rgba(0,240,255,0.1)] border border-[#00f0ff] text-[#00f0ff] px-3 py-1 rounded text-xs tracking-widest mb-3">
            v3.0
          </div>
          <h1 class="text-2xl font-extrabold tracking-widest">
            REGIX<span class="text-[#00f0ff] font-light ml-3 text-xl"
              >// REGISTRATION</span
            >
          </h1>
          <p class="text-[#64748b] text-sm mt-2">
            Enter your license key to create an account
          </p>
        </div>

        <!-- Form -->
        <form
          id="registerForm"
          class="space-y-4">
          <div>
            <label
              class="block text-[#00f0ff] text-xs font-semibold tracking-wider mb-1.5"
              >LICENSE KEY</label
            >
            <input
              type="text"
              id="regLicenseKey"
              placeholder="REGIX-XXXXXXXX..."
              required
              class="w-full px-3 py-2.5 rounded text-sm" />
          </div>
          <div>
            <label
              class="block text-[#00f0ff] text-xs font-semibold tracking-wider mb-1.5"
              >USERNAME</label
            >
            <input
              type="text"
              id="regUsername"
              placeholder="Choose a username"
              required
              class="w-full px-3 py-2.5 rounded text-sm" />
          </div>
          <div>
            <label
              class="block text-[#00f0ff] text-xs font-semibold tracking-wider mb-1.5"
              >PASSWORD</label
            >
            <input
              type="password"
              id="regPassword"
              placeholder="Min 6 characters"
              required
              minlength="6"
              class="w-full px-3 py-2.5 rounded text-sm" />
          </div>
          <div>
            <label
              class="block text-[#64748b] text-xs font-semibold tracking-wider mb-1.5"
              >FULL NAME <span class="text-[#404460]">(optional)</span></label
            >
            <input
              type="text"
              id="regFullName"
              placeholder="Your full name"
              class="w-full px-3 py-2.5 rounded text-sm" />
          </div>
          <div>
            <label
              class="block text-[#64748b] text-xs font-semibold tracking-wider mb-1.5"
              >EMAIL <span class="text-[#404460]">(optional)</span></label
            >
            <input
              type="email"
              id="regEmail"
              placeholder="your@email.com"
              class="w-full px-3 py-2.5 rounded text-sm" />
          </div>
          <div>
            <label
              class="block text-[#64748b] text-xs font-semibold tracking-wider mb-1.5"
              >DISCORD ID <span class="text-[#404460]">(optional)</span></label
            >
            <input
              type="text"
              id="regDiscordId"
              placeholder="123456789012345678"
              class="w-full px-3 py-2.5 rounded text-sm" />
          </div>

          <button
            type="submit"
            id="registerBtn"
            class="btn-neon w-full py-3 text-xs tracking-widest">
            <span class="relative z-10">CREATE ACCOUNT</span>
          </button>
        </form>

        <div class="text-center mt-6 text-sm">
          <span class="text-[#64748b]">Already have an account?</span>
          <a
            href="/login"
            class="text-[#00f0ff] ml-2 hover:underline"
            >Login</a
          >
        </div>
      </div>
    </div>

    <script src="/js/particles.js"></script>
    <script src="/js/toast.js"></script>
    <script>
      (function () {
        var form = document.getElementById("registerForm");
        var btn = document.getElementById("registerBtn");
        var btnText = btn.querySelector("span");

        form.addEventListener("submit", async function (e) {
          e.preventDefault();

          var licenseKey = document
            .getElementById("regLicenseKey")
            .value.trim();
          var username = document.getElementById("regUsername").value.trim();
          var password = document.getElementById("regPassword").value;
          var fullName = document.getElementById("regFullName").value.trim();
          var email = document.getElementById("regEmail").value.trim();
          var discordId = document.getElementById("regDiscordId").value.trim();

          if (!licenseKey || !username || !password) {
            showToast(
              "License key, username, and password are required.",
              "error",
            );
            return;
          }
          if (password.length < 6) {
            showToast("Password must be at least 6 characters.", "error");
            return;
          }

          btn.disabled = true;
          btnText.textContent = "CREATING...";

          try {
            var res = await fetch("/api/auth/register", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                licenseKey: licenseKey,
                username: username,
                password: password,
                fullName: fullName || undefined,
                email: email || undefined,
                discordId: discordId || undefined,
              }),
            });
            var data = await res.json();

            if (data.success) {
              showToast(
                "Account created successfully! Redirecting to login...",
                "success",
                5000,
              );
              setTimeout(function () {
                window.location.href = "/login";
              }, 2000);
            } else {
              showToast(data.message || "Registration failed.", "error");
            }
          } catch (err) {
            showToast("Connection error: " + err.message, "error");
          }

          btn.disabled = false;
          btnText.textContent = "CREATE ACCOUNT";
        });
      })();
    </script>
  </body>
</html>
